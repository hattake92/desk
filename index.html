<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш холодильник</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Caveat', cursive; background: #e8ecef; overflow-x: hidden; min-height: 100vh; }

        /* --- ЭКРАН АВТОРИЗАЦИИ --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #222; display: flex; justify-content: center; align-items: center;
            z-index: 1000; font-family: sans-serif; transition: opacity 0.5s ease;
            padding: 20px;
        }
        .auth-box {
            background: #fff; padding: 30px 20px; border-radius: 10px; text-align: center;
            width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-box h2 { font-family: 'Caveat', cursive; font-size: 32px; margin-bottom: 20px; color: #333; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .auth-box button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; font-size: 16px; }
        .auth-box button:hover { background: #555; }
        #auth-error { color: red; font-size: 14px; margin-top: 10px; display: none; }

        /* --- ПРИВЕТСТВЕННЫЙ ЭКРАН --- */
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(34, 34, 34, 0.95); display: flex; justify-content: center; align-items: center;
            z-index: 900; opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        .welcome-message {
            font-size: 54px; color: #fff; text-align: center;
            transform: scale(0.8); transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #welcome-overlay.active { opacity: 1; pointer-events: auto; }
        #welcome-overlay.active .welcome-message { transform: scale(1); }

        /* --- МОДАЛЬНОЕ ОКНО ДЛЯ ПРОСМОТРА ФОТО --- */
        #image-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            cursor: zoom-out; padding: 20px;
        }
        #image-modal.active { opacity: 1; pointer-events: auto; }
        #modal-img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 5px 30px rgba(0,0,0,0.5); }

        /* --- ДОСКА СО СТИКЕРАМИ --- */
        #fridge-scene {
            width: 100vw; min-height: 100vh;
            background: #e8ecef; padding-top: 90px; padding-bottom: 60px;
        }
        .controls {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); padding: 8px 15px; border-radius: 30px; 
            display: flex; gap: 8px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 95vw; flex-wrap: wrap; justify-content: center;
        }
        button.btn { background: #333; color: #fff; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-family: sans-serif; font-size: 13px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        button.btn:hover { background: #555; }
        button.btn-red { background: #d32f2f; }
        button.btn-red:hover { background: #b71c1c; }

        /* --- КОЛОНОЧНАЯ СЕТКА (СТИКИИЕРИ НЕ РАСТЯГИВАЮТ ДРУГ ДРУГА) --- */
        #notes-container {
            width: 92%; max-width: 1200px; margin: 0 auto;
            column-count: 4;
            column-gap: 20px;
            padding: 10px;
        }

        .note {
            background-color: #fdf5c9;
            padding: 35px 20px 20px; 
            box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            font-size: 24px; line-height: 1.2; 
            position: relative;
            border-radius: 4px;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            break-inside: avoid;
            min-height: 200px;
        }
        
        .note::before {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-2deg);
            width: 80px; height: 25px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(2px); border-radius: 2px;
        }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: transparent; border: none; font-size: 18px; cursor: pointer; z-index: 10; padding: 5px; color: #333; }
        
        .note-body-container { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; margin-top: 5px; }
        .editable-chunk { outline: none; cursor: text; white-space: pre-wrap; width: 100%; word-break: break-word; min-height: 24px; }
        .editable-chunk:empty:before { content: attr(placeholder); color: rgba(0,0,0,0.4); pointer-events: none; display: block; }
        .editable-chunk:focus { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        
        .note-title { font-weight: bold; font-size: 26px; border-bottom: 1px dashed rgba(0,0,0,0.2); padding-bottom: 5px; margin-bottom: 10px; min-height: 35px; outline: none; }
        .note-photo { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 10px; border-radius: 5px; cursor: zoom-in; transition: 0.2s; }
        .note-photo:hover { opacity: 0.9; }

        /* Чекбоксы */
        .checklist-container { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .checklist-item { display: flex; align-items: center; gap: 8px; font-size: 22px; }
        .checklist-item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #333; flex-shrink: 0; }
        .checklist-item input[type="text"] { border: none; background: transparent; outline: none; font-family: 'Caveat', cursive; font-size: 22px; width: 100%; }
        .checklist-item.completed span, .checklist-item.completed input[type="text"] { text-decoration: line-through; color: #777 !important; }
        .add-item-btn { background: rgba(0,0,0,0.05); border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-family: 'Caveat', cursive; font-size: 18px; margin-top: 10px; align-self: flex-start; }
        .add-item-btn:hover { background: rgba(0,0,0,0.1); }

        /* Адаптивность колонок */
        @media (max-width: 1024px) { #notes-container { column-count: 3; } }
        @media (max-width: 768px) { #notes-container { column-count: 2; } }
        @media (max-width: 500px) {
            #notes-container { column-count: 1; }
            .controls { padding: 6px 10px; gap: 5px; top: 10px; }
            button.btn { padding: 6px 10px; font-size: 12px; }
            #fridge-scene { padding-top: 75px; }
        }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>Наш холодильник</h2>
            <input type="email" id="email" placeholder="Email" inputmode="email">
            <input type="password" id="password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <div id="auth-error">Неверный логин или пароль</div>
        </div>
    </div>

    <!-- Приветствие -->
    <div id="welcome-overlay">
        <div class="welcome-message" id="welcome-text">Добро пожаловать!</div>
    </div>

    <!-- Модальное окно для увеличенного просмотра фото -->
    <div id="image-modal" onclick="closeImageModal()">
        <img id="modal-img" src="" alt="Увеличенное фото">
    </div>

    <!-- Доска со стикерами -->
    <div id="fridge-scene">
        <div class="controls">
            <button class="btn" onclick="addNote('text')">+ Записка</button>
            <button class="btn" onclick="addNote('list')">+ Список</button>
            <button class="btn" onclick="triggerPhotoUpload()">+ Фото</button>
            <button class="btn btn-red" onclick="logout()">Выйти</button>
        </div>
        <div id="notes-container"></div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <script>
        const SUPABASE_URL = 'https://omnrboyfacfgauuatluq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_z7VuggWQxv7VU6Q5wwzVuQ_aI6nUqO7';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let notesData = [];
        const colors = ['#fdf5c9', '#e3fad1', '#ffdce0', '#d1f4fa'];
        let currentUserEmail = '';

        function getTextColor(email) {
            if (email && email.toLowerCase().includes('sabina')) {
                return '#7c2180'; 
            }
            return '#004019'; 
        }

        async function checkSession() {
            const { data: { session } } = await db.auth.getSession();
            if (session && session.user) {
                currentUserEmail = session.user.email;
                document.getElementById('auth-overlay').style.display = 'none';
                loadNotes();
            }
        }

        function showWelcomeAndOpen(email) {
            currentUserEmail = email;
            const welcomeOverlay = document.getElementById('welcome-overlay');
            const welcomeText = document.getElementById('welcome-text');

            let name = 'Эмилька';
            if (email.toLowerCase().includes('sabina')) {
                name = 'Сабинка';
            }

            welcomeText.innerText = `Добро пожаловать, ${name}!`;
            welcomeOverlay.classList.add('active');

            setTimeout(() => {
                welcomeOverlay.style.opacity = '0';
                setTimeout(() => {
                    welcomeOverlay.style.display = 'none';
                    loadNotes();
                }, 500);
            }, 1800);
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            
            if (error) {
                errorDiv.style.display = 'block'; 
                errorDiv.innerText = error.message;
            } else {
                errorDiv.style.display = 'none';
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 500);
                showWelcomeAndOpen(email);
            }
        }

        document.getElementById('email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });

        async function logout() { 
            await db.auth.signOut(); 
            window.location.reload(); 
        }

        checkSession();

        async function loadNotes() {
            const { data, error } = await db.from('fridge_notes')
                .select('*')
                .eq('is_deleted', false)
                .order('updated_at', { ascending: false });
            if (!error && data) {
                notesData = data.map(note => {
                    if ((!note.text_chunks || note.text_chunks.length === 0) && note.text_content) {
                        note.text_chunks = [{ text: note.text_content, author: note.author_email || 'emil@ourdesk.com' }];
                    }
                    return note;
                });
                renderNotes();
            }
        }

        async function saveNoteToDB(noteInfo) {
            noteInfo.updated_at = new Date().toISOString();

            await db.from('fridge_notes').upsert([{
                id: noteInfo.id,
                title: noteInfo.title || '',
                text_content: '',
                text_chunks: noteInfo.text_chunks || [],
                image_url: noteInfo.image_url || '',
                list_items: noteInfo.list_items || [],
                rotation: noteInfo.rotation || 0,
                color: noteInfo.color,
                author_email: noteInfo.author_email || currentUserEmail,
                updated_at: noteInfo.updated_at,
                is_deleted: noteInfo.is_deleted
            }]);
        }

        const container = document.getElementById('notes-container');

        function renderNotes() {
            container.innerHTML = '';
            notesData.forEach(note => {
                if(!note.is_deleted) createNoteDOM(note);
            });
        }

        function createNoteDOM(noteInfo) {
            const note = document.createElement('div');
            note.className = 'note';
            note.style.backgroundColor = noteInfo.color;
            note.style.transform = `rotate(${noteInfo.rotation || 0}deg)`;
            
            const titleColor = getTextColor(noteInfo.author_email);
            
            let contentHtml = '';
            if (noteInfo.image_url) {
                contentHtml = `<img src="${noteInfo.image_url}" class="note-photo" onclick="openImageModal('${noteInfo.image_url}')" title="Нажмите для увеличения">`;
            } else if (noteInfo.list_items && noteInfo.list_items.length > 0) {
                contentHtml = `<div class="checklist-container" id="checklist-${noteInfo.id}"></div>
                               <button class="add-item-btn" onclick="window.addListItem('${noteInfo.id}')" style="color: ${getTextColor(currentUserEmail)}">+ Пункт</button>`;
            } else {
                if (!noteInfo.text_chunks || noteInfo.text_chunks.length === 0) {
                    noteInfo.text_chunks = [{ text: '', author: currentUserEmail }];
                }
                contentHtml = `<div class="note-body-container" id="lines-container-${noteInfo.id}"></div>
                               <button class="add-item-btn" onclick="window.appendNewText('${noteInfo.id}')" style="color: ${getTextColor(currentUserEmail)}">+ Дописать</button>`;
            }

            note.innerHTML = `
                <button class="delete-btn" onclick="window.deleteNote('${noteInfo.id}')" style="color: ${titleColor}">✖</button>
                <div class="note-title" contenteditable="true" spellcheck="false" placeholder="Заголовок..." style="color: ${titleColor}" oninput="window.updateTitle('${noteInfo.id}', this.innerText)">${noteInfo.title || ''}</div>
                ${contentHtml}
            `;
            
            container.appendChild(note);

            if (noteInfo.list_items && noteInfo.list_items.length > 0) {
                renderChecklist(noteInfo);
            } else if (!noteInfo.image_url) {
                renderTextChunks(noteInfo);
            }
        }

        // Функции модального окна для фото
        function openImageModal(url) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = url;
            modal.classList.add('active');
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('active');
        }

        function renderTextChunks(noteInfo) {
            const linesContainer = document.getElementById(`lines-container-${noteInfo.id}`);
            if(!linesContainer) return;
            linesContainer.innerHTML = '';

            noteInfo.text_chunks.forEach((chunk, index) => {
                const chunkEl = document.createElement('div');
                chunkEl.className = 'editable-chunk';
                chunkEl.contentEditable = true;
                chunkEl.spellcheck = false;
                chunkEl.innerText = chunk.text;
                
                chunkEl.style.color = getTextColor(chunk.author);

                chunkEl.oninput = (e) => {
                    noteInfo.text_chunks[index].text = e.target.innerText;
                    saveNoteToDBQuiet(noteInfo);
                };

                linesContainer.appendChild(chunkEl);
            });
        }

        window.appendNewText = function(id) {
            const note = notesData.find(n => n.id === id);
            if(note) {
                if(!note.text_chunks) note.text_chunks = [];
                note.text_chunks.push({ text: '', author: currentUserEmail });
                saveNoteToDB(note);
                renderNotes();
            }
        };

        window.updateTitle = function(id, text) {
            const note = notesData.find(n => n.id === id);
            if(note) {
                note.title = text.replace(/<[^>]*>/g, '');
                saveNoteToDBQuiet(note);
            }
        };

        function renderChecklist(noteInfo) {
            const listContainer = document.getElementById(`checklist-${noteInfo.id}`);
            if(!listContainer) return;
            listContainer.innerHTML = '';

            noteInfo.list_items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `checklist-item ${item.completed ? 'completed' : ''}`;
                const itemColor = getTextColor(item.author || noteInfo.author_email);

                itemDiv.innerHTML = `
                    <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="window.toggleItem('${noteInfo.id}', ${index})">
                    <input type="text" value="${item.text}" placeholder="Пункт..." style="color: ${itemColor}" oninput="window.updateItemText('${noteInfo.id}', ${index}, this.value)">
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        window.addListItem = function(id) {
            const note = notesData.find(n => n.id === id);
            if(note) {
                if(!note.list_items) note.list_items = [];
                note.list_items.push({ text: '', completed: false, author: currentUserEmail });
                saveNoteToDB(note);
                renderNotes();
            }
        };

        window.toggleItem = function(id, index) {
            const note = notesData.find(n => n.id === id);
            if(note && note.list_items[index]) {
                note.list_items[index].completed = !note.list_items[index].completed;
                saveNoteToDB(note);
            }
        };

        window.updateItemText = function(id, index, text) {
            const note = notesData.find(n => n.id === id);
            if(note && note.list_items[index]) {
                note.list_items[index].text = text;
                note.list_items[index].author = currentUserEmail;
                saveNoteToDBQuiet(note);
            }
        };

        async function saveNoteToDB(noteInfo) {
            noteInfo.updated_at = new Date().toISOString();
            await db.from('fridge_notes').upsert([{
                id: noteInfo.id,
                title: noteInfo.title || '',
                text_content: '',
                text_chunks: noteInfo.text_chunks || [],
                image_url: noteInfo.image_url || '',
                list_items: noteInfo.list_items || [],
                rotation: noteInfo.rotation || 0,
                color: noteInfo.color,
                author_email: noteInfo.author_email || currentUserEmail,
                updated_at: noteInfo.updated_at,
                is_deleted: noteInfo.is_deleted
            }]);
        }

        async function saveNoteToDBQuiet(noteInfo) {
            noteInfo.updated_at = new Date().toISOString();
            await db.from('fridge_notes').upsert([{
                id: noteInfo.id,
                title: noteInfo.title || '',
                text_content: '',
                text_chunks: noteInfo.text_chunks || [],
                image_url: noteInfo.image_url || '',
                list_items: noteInfo.list_items || [],
                rotation: noteInfo.rotation || 0,
                color: noteInfo.color,
                author_email: noteInfo.author_email || currentUserEmail,
                updated_at: noteInfo.updated_at,
                is_deleted: noteInfo.is_deleted
            }]);
        }

        window.addNote = async function(type, imageUrl = '') {
            const color = colors[Math.floor(Math.random() * colors.length)];
            let listItems = [];
            let textChunks = [];
            if(type === 'list') {
                listItems = [{ text: 'Купить молоко', completed: false, author: currentUserEmail }];
            } else {
                textChunks = [{ text: 'Новая записка...', author: currentUserEmail }];
            }

            const newNote = {
                id: crypto.randomUUID(),
                title: type === 'list' ? 'Список' : '',
                text_chunks: textChunks,
                image_url: imageUrl,
                list_items: listItems,
                rotation: Math.floor(Math.random() * 6) - 3,
                color: color,
                author_email: currentUserEmail,
                updated_at: new Date().toISOString(),
                is_deleted: false
            };

            notesData.unshift(newNote);
            renderNotes();
            await saveNoteToDB(newNote);
        }

        window.triggerPhotoUpload = function() {
            const input = document.getElementById('file-input');
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => window.addNote('photo', ev.target.result);
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        window.deleteNote = async function(id) {
            const note = notesData.find(n => n.id === id);
            if(note) {
                note.is_deleted = true;
                renderNotes();
                await saveNoteToDB(note);
            }
        }
    </script>
</body>
</html>
