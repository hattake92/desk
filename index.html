<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш холодильник</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Caveat', cursive; background: #222; }

        /* --- ЭКРАН АВТОРИЗАЦИИ --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #222; display: flex; justify-content: center; align-items: center;
            z-index: 1000; font-family: sans-serif; transition: opacity 0.5s ease;
        }
        .auth-box {
            background: #fff; padding: 40px; border-radius: 10px; text-align: center;
            width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-box h2 { font-family: 'Caveat', cursive; font-size: 32px; margin-bottom: 20px; }
        .auth-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .auth-box button { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .auth-box button:hover { background: #555; }
        #auth-error { color: red; font-size: 14px; margin-top: 10px; display: none; }

        /* --- СЦЕНА 1: КОМНАТА --- */
        #room-scene {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #f0e2d3 65%, #6e4b33 65%);
            display: flex; justify-content: center; align-items: flex-end;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease;
            transform-origin: center 60%; z-index: 10; overflow: hidden;
        }
        .fridge-shadow { position: absolute; bottom: 50px; width: 320px; height: 20px; background: rgba(0,0,0,0.3); border-radius: 50%; filter: blur(10px); }
        .fridge-object {
            position: relative; bottom: 70px; width: 300px; height: 500px; background: #e8ecef;
            border-radius: 15px; border: 2px solid #cfd6da; cursor: pointer; transition: 0.3s;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.05), 10px 10px 20px rgba(0,0,0,0.2);
        }
        .fridge-object:hover { transform: scale(1.02); }
        .fridge-object::before { content: ''; position: absolute; top: 30%; left: 0; width: 100%; height: 2px; background: #cfd6da; z-index: 5;}
        .fridge-handle-top { position: absolute; top: 10%; left: 20px; width: 8px; height: 60px; background: #b0bec5; border-radius: 5px; z-index: 5;}
        .fridge-handle-bottom { position: absolute; top: 35%; left: 20px; width: 8px; height: 120px; background: #b0bec5; border-radius: 5px; z-index: 5;}
        
        #mini-notes-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            border-radius: 13px; overflow: hidden; pointer-events: none; z-index: 2;
        }

        /* --- СЦЕНА 2: ПОВЕРХНОСТЬ ХОЛОДИЛЬНИКА (С прокруткой) --- */
        #fridge-scene {
            position: absolute; top: 0; left: 0; width: 100vw; min-height: 150vh;
            background: #e8ecef; opacity: 0; pointer-events: none; transition: opacity 1s ease; z-index: 20;
            overflow-y: auto; padding-top: 100px; padding-bottom: 100px;
        }
        .controls {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 30px; 
            display: flex; gap: 15px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button.btn { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-family: sans-serif; font-size: 14px; font-weight: bold; transition: 0.2s; }
        button.btn:hover { background: #555; transform: translateY(-2px); }
        button.btn-red { background: #d32f2f; }
        button.btn-red:hover { background: #b71c1c; }

        /* --- СЕТКА СТИКЕРОВ --- */
        #notes-container {
            width: 90%; max-width: 1200px; margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .note {
            background-color: #fdf5c9;
            padding: 35px 20px 20px; 
            box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            font-size: 24px; line-height: 1.2; color: #333; 
            position: relative;
            border-radius: 4px;
            display: flex; flex-direction: column;
            min-height: 220px;
        }
        
        .note::before {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-2deg);
            width: 80px; height: 25px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(2px); border-radius: 2px;
        }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: transparent; border: none; color: rgba(0,0,0,0.3); font-size: 16px; cursor: pointer; z-index: 10; transition: 0.2s; }
        .delete-btn:hover { color: red; transform: scale(1.2); }
        
        .editable { outline: none; cursor: text; white-space: pre-wrap; width: 100%; }
        .editable:empty:before { content: attr(placeholder); color: rgba(0,0,0,0.4); pointer-events: none; display: block; }
        .editable:focus { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        
        .note-title { font-weight: bold; font-size: 26px; border-bottom: 1px dashed rgba(0,0,0,0.2); padding-bottom: 5px; margin-bottom: 10px; min-height: 35px; }
        .note-body { flex-grow: 1; min-height: 30px; }
        .note-photo { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 10px; border-radius: 5px; }

        /* Чекбоксы */
        .checklist-container { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .checklist-item { display: flex; align-items: center; gap: 8px; font-size: 22px; }
        .checklist-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #333; }
        .checklist-item input[type="text"] { border: none; background: transparent; outline: none; font-family: 'Caveat', cursive; font-size: 22px; width: 100%; }
        .checklist-item.completed span, .checklist-item.completed input[type="text"] { text-decoration: line-through; color: #777; }
        .add-item-btn { background: rgba(0,0,0,0.05); border: none; padding: 4px 10px; border-radius: 10px; cursor: pointer; font-family: 'Caveat', cursive; font-size: 18px; margin-top: 10px; align-self: flex-start; }
        .add-item-btn:hover { background: rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>Наш холодильник</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <div id="auth-error">Неверный логин или пароль</div>
        </div>
    </div>

    <!-- СЦЕНА 1: Комната -->
    <div id="room-scene">
        <div class="fridge-shadow"></div>
        <div class="fridge-object" onclick="zoomToFridge()">
            <div class="fridge-handle-top"></div>
            <div class="fridge-handle-bottom"></div>
            <div id="mini-notes-container"></div>
        </div>
    </div>

    <!-- СЦЕНА 2: Поверхность холодильника -->
    <div id="fridge-scene">
        <div class="controls">
            <button class="btn" onclick="zoomOut()">⬅ В комнату</button>
            <button class="btn" onclick="addNote('text')">+ Записка</button>
            <button class="btn" onclick="addNote('list')">+ Список</button>
            <button class="btn" onclick="triggerPhotoUpload()">+ Фото</button>
            <button class="btn btn-red" onclick="logout()">Выйти</button>
        </div>
        <div id="notes-container"></div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <script>
        const SUPABASE_URL = 'https://omnrboyfacfgauuatluq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_z7VuggWQxv7VU6Q5wwzVuQ_aI6nUqO7';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let notesData = [];
        const colors = ['#fdf5c9', '#e3fad1', '#ffdce0', '#d1f4fa'];

        async function checkSession() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                document.getElementById('auth-overlay').style.display = 'none';
                loadNotes();
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) {
                errorDiv.style.display = 'block'; errorDiv.innerText = error.message;
            } else {
                errorDiv.style.display = 'none';
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 500);
                loadNotes();
            }
        }

        async function logout() { await db.auth.signOut(); window.location.reload(); }
        checkSession();

        async function loadNotes() {
            const { data, error } = await db.from('fridge_notes').select('*').eq('is_deleted', false);
            if (!error && data) {
                notesData = data;
                renderNotes();
            }
        }

        async function saveNoteToDB(noteInfo) {
            await db.from('fridge_notes').upsert([{
                id: noteInfo.id,
                title: noteInfo.title || '',
                text_content: noteInfo.text_content || '',
                image_url: noteInfo.image_url || '',
                list_items: noteInfo.list_items || [],
                rotation: noteInfo.rotation || 0,
                color: noteInfo.color,
                is_deleted: noteInfo.is_deleted
            }]);
            updateMiniFridge();
        }

        const roomScene = document.getElementById('room-scene');
        const fridgeScene = document.getElementById('fridge-scene');

        function zoomToFridge() {
            roomScene.style.transform = 'scale(4) translateY(20%)';
            roomScene.style.opacity = '0';
            setTimeout(() => { fridgeScene.style.opacity = '1'; fridgeScene.style.pointerEvents = 'auto'; }, 600);
        }

        function zoomOut() {
            fridgeScene.style.opacity = '0'; fridgeScene.style.pointerEvents = 'none';
            setTimeout(() => { roomScene.style.transform = 'scale(1) translateY(0)'; roomScene.style.opacity = '1'; }, 500);
        }

        function updateMiniFridge() {
            const miniContainer = document.getElementById('mini-notes-container');
            miniContainer.innerHTML = '';
            
            notesData.forEach((n, index) => {
                if(n.is_deleted) return;
                const dot = document.createElement('div');
                dot.style.position = 'absolute';
                // Располагаем точки на мини-холодильнике аккуратной сеткой
                const col = index % 2;
                const row = Math.floor(index / 2);
                dot.style.left = (20 + col * 130) + 'px';
                dot.style.top = (40 + row * 100) + 'px';
                dot.style.width = '110px';
                dot.style.height = '85px';
                dot.style.backgroundColor = n.color;
                dot.style.transform = `rotate(${n.rotation || 0}deg)`;
                dot.style.boxShadow = '1px 1px 2px rgba(0,0,0,0.3)';
                dot.style.borderRadius = '2px';
                miniContainer.appendChild(dot);
            });
        }

        const container = document.getElementById('notes-container');

        function renderNotes() {
            container.innerHTML = '';
            notesData.forEach(note => {
                if(!note.is_deleted) createNoteDOM(note);
            });
            updateMiniFridge();
        }

        function createNoteDOM(noteInfo) {
            const note = document.createElement('div');
            note.className = 'note';
            note.style.backgroundColor = noteInfo.color;
            note.style.transform = `rotate(${noteInfo.rotation || 0}deg)`;
            note.dataset.id = noteInfo.id;
            
            let contentHtml = '';
            if (noteInfo.image_url) {
                contentHtml = `<img src="${noteInfo.image_url}" class="note-photo">`;
            } else if (noteInfo.list_items && noteInfo.list_items.length > 0) {
                contentHtml = `<div class="checklist-container" id="checklist-${noteInfo.id}"></div>
                               <button class="add-item-btn" onclick="addListItem('${noteInfo.id}')">+ Пункт</button>`;
            } else {
                contentHtml = `<div class="editable note-body" contenteditable="true" spellcheck="false" data-field="text_content" placeholder="Текст...">${noteInfo.text_content || ''}</div>`;
            }

            note.innerHTML = `
                <button class="delete-btn" onclick="deleteNote('${noteInfo.id}')">✖</button>
                <div class="editable note-title" contenteditable="true" spellcheck="false" data-field="title" placeholder="Заголовок...">${noteInfo.title || ''}</div>
                ${contentHtml}
            `;
            
            container.appendChild(note);

            if (noteInfo.list_items && noteInfo.list_items.length > 0) {
                renderChecklist(noteInfo);
            }

            let textTimeout;
            note.querySelectorAll('.editable').forEach(el => {
                el.addEventListener('input', (e) => {
                    clearTimeout(textTimeout);
                    const field = e.target.dataset.field;
                    if(field) {
                        noteInfo[field] = e.target.innerHTML;
                        textTimeout = setTimeout(() => saveNoteToDB(noteInfo), 1000);
                    }
                });
            });
        }

        function renderChecklist(noteInfo) {
            const listContainer = document.getElementById(`checklist-${noteInfo.id}`);
            if(!listContainer) return;
            listContainer.innerHTML = '';

            noteInfo.list_items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `checklist-item ${item.completed ? 'completed' : ''}`;
                itemDiv.innerHTML = `
                    <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem('${noteInfo.id}', ${index})">
                    <input type="text" value="${item.text}" placeholder="Пункт..." oninput="updateItemText('${noteInfo.id}', ${index}, this.value)">
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        window.addListItem = function(id) {
            const note = notesData.find(n => n.id === id);
            if(note) {
                if(!note.list_items) note.list_items = [];
                note.list_items.push({ text: '', completed: false });
                renderChecklist(note);
                saveNoteToDB(note);
            }
        };

        window.toggleItem = function(id, index) {
            const note = notesData.find(n => n.id === id);
            if(note && note.list_items[index]) {
                note.list_items[index].completed = !note.list_items[index].completed;
                renderChecklist(note);
                saveNoteToDB(note);
            }
        };

        window.updateItemText = function(id, index, text) {
            const note = notesData.find(n => n.id === id);
            if(note && note.list_items[index]) {
                note.list_items[index].text = text;
                saveNoteToDB(note);
            }
        };

        async function addNote(type, imageUrl = '') {
            const color = colors[Math.floor(Math.random() * colors.length)];
            let listItems = [];
            if(type === 'list') {
                listItems = [{ text: 'Купить молоко', completed: false }];
            }

            const newNote = {
                id: crypto.randomUUID(),
                title: type === 'list' ? 'Список' : '',
                text_content: imageUrl || type === 'list' ? '' : 'Новая записка...',
                image_url: imageUrl,
                list_items: listItems,
                rotation: Math.floor(Math.random() * 6) - 3,
                color: color,
                is_deleted: false
            };

            notesData.push(newNote);
            renderNotes();
            await saveNoteToDB(newNote);
        }

        function triggerPhotoUpload() {
            const input = document.getElementById('file-input');
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => addNote('photo', ev.target.result);
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        async function deleteNote(id) {
            const note = notesData.find(n => n.id === id);
            if(note) {
                note.is_deleted = true;
                renderNotes();
                await saveNoteToDB(note);
            }
        }
    </script>
</body>
</html>
